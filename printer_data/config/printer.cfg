[include mainsail.cfg]
[include FanTachMonitoring.cfg]
[include homing.cfg]
[include KAMP_Settings.cfg]
[include goose_belt.cfg]
[include stealthburner_leds.cfg]
[include PrintStartMacro.cfg]
[include PauseResumeCancelMacros.cfg]
[include TEST_SPEED.cfg]


[force_move]
[display_status]
[respond]
[exclude_object]
# Enable arcs support
[gcode_arcs] # only needed for orcaslicer
resolution: 0.1

#[axis_twist_compensation]

# Use with Califlower change per filament type (ASA, ABS, PLA, PETG)
[skew_correction]


[mcu]
canbus_uuid: e9b7a2a224e1
# serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_3A003B000251303532383235-if00
# restart_method: command

[mcu nhk]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_2C000B000550303857383820-if00
restart_method: command
##--------------------------------------------------------------------

# [mcu boxturtle]
# canbus_uuid: b263ee28a392

[virtual_sdcard]
path: /home/plazmazero/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[printer]
kinematics: corexy
max_velocity: 500  
max_accel: 15000
max_z_velocity: 15          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 6.0 #5.0

[input_shaper]
# Recommended X Accel: 12280
# Recommended Y Accel: 5300
shaper_freq_x: 79.8 # center frequency for the X axis filter
shaper_type_x: ei # filter type for the X axis
shaper_freq_y: 51.6 # center frequency for the Y axis filter
shaper_type_y: ei # filter type for the Y axis
damping_ratio_x: 0.066 # damping ratio for the X axis
damping_ratio_y: 0.060 # damping ratio for the Y axis


[save_variables]
filename: ~/printer_data/config/bed_clear_confirmation_variables.cfg
[gcode_button bed_cleared_button]
pin: !PC3
press_gcode:
  SAVE_VARIABLE VARIABLE=clear_confirmed VALUE=True
  SET_DISPLAY_TEXT MSG="Bed confirmed cleared"
  RESPOND TYPE=command MSG='Bed cleared confirmation pressed.'

[delayed_gcode print_bed_clear_status]
initial_duration: 10
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set cleared_state = svv.clear_confirmed %}
  RESPOND TYPE=command MSG='Bed cleared state: {cleared_state}'


#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left
##  Connected to HV STEPPER 0
##  Endstop connected to X-ENDSTOP
[stepper_x]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200 #400  #set to 200 for 1.8 degree stepper
#endstop_pin: PC1
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_min: 0

##  Uncomment for 300mm build
position_endstop: 306 # Add a little space from the edge for full plate prints
position_max: 306
position_min: -1

homing_speed: 80 #25   #Max 100
homing_retract_dist: 0 #5
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc5160 stepper_x]
cs_pin: PE15
spi_bus: spi4
diag0_pin: ^!PG1
interpolate: true #false # True for TMC_autotune 
run_current: 2.0 #1.5 #1.2 #0.8
sense_resistor: 0.075
#stealthchop_threshold: 0 # Comment out for TMC_Autotune
#driver_SGT: 0 # Max: -3 , Min:-1  # -64 is most sensitive value, 63 is least sensitive

# TMC_Autotune definitions
[autotune_tmc stepper_x]
motor: ldo-42sth48-2504ah
sgt: 1

##  A Stepper - Right
##  Connected to HV STEPPER 1
##  Endstop connected to Y-ENDSTOP
[stepper_y]
step_pin: PF15
dir_pin: !PF14
enable_pin: !PE9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200 #400  #set to 200 for 1.8 degree stepper
#endstop_pin: PC2
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_min: 0

##  Uncomment for 300mm build
position_endstop: 310
position_max: 310

homing_speed: 80 #25  #Max 100
homing_retract_dist: 0 #5
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc5160 stepper_y]
cs_pin: PE11
spi_bus: spi4
diag0_pin: ^!PE10
interpolate: true #false # True for TMC_autotune 
run_current: 2.0 #1.5 #0.8
sense_resistor: 0.075
#stealthchop_threshold: 0 # Comment out for TMC_Autotune
#driver_SGT: -2 # Max: -3 , Min:-1  # -64 is most sensitive value, 63 is least sensitive

# TMC_Autotune definitions
[autotune_tmc stepper_y]
motor: ldo-42sth48-2504ah
sgt: 0
 
#####################################################################
#   Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left
##  Connected to STEPPER 0
##  Endstop connected to Z-ENDSTOP
[stepper_z]
step_pin: PD4
dir_pin: PD3
enable_pin: !PD7
# Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
rotation_distance: 4
microsteps: 32
#endstop_pin: PC3
##  Z-position of nozzle (in mm) to z-endstop trigger point relative to print surface (Z0)
##  (+) value = endstop above Z0, (-) value = endstop below
##  Increasing position_endstop brings nozzle closer to the bed
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: -0.5

endstop_pin: probe:z_virtual_endstop # uses cartographer as virtual endstop
homing_retract_dist: 0 # cartographer needs this to be set to 0
#position_endstop: 5 # cartographer needs this to be commented out

##  Uncomment below for 300mm build
position_max: 280 # Test limits since we are 300 cubed

position_min: -5
homing_speed: 8
second_homing_speed: 3
#homing_retract_dist: 3

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc2209 stepper_z]
uart_pin: PD5
diag_pin: ^!PD6
interpolate: true #false # True for TMC_autotune 
run_current: 0.8
sense_resistor: 0.110
#stealthchop_threshold: 0 # Comment out for TMC_Autotune

# TMC_Autotune definitions
[autotune_tmc stepper_z]
motor: ldo-42sth40-1684l300e # Same as LD0-42STH40-1684CL350E per docs

##  Z1 Stepper - Rear Center
##  Connected to STEPPER 1
[stepper_z1]
step_pin: PC12
dir_pin: PC11
enable_pin: !PD2
# Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
rotation_distance: 4
microsteps: 32

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc2209 stepper_z1]
uart_pin: PD0
diag_pin: ^!PD1
interpolate: true #false # True for TMC_autotune 
run_current: 0.8
sense_resistor: 0.110
# stealthchop_threshold: 0 # Comment out for TMC_Autotune

# TMC_Autotune definitions
[autotune_tmc stepper_z1]
motor: ldo-42sth40-1684l300e # Same as LD0-42STH40-1684CL350E per docs

##  Z2 Stepper - Front Right
##  Connected to STEPPER 2
[stepper_z2]
step_pin: PC9
dir_pin: PC8
enable_pin: !PC10
# Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
rotation_distance: 4
microsteps: 32

##  Make sure to update below for your relevant driver (2209 or 5160)
[tmc2209 stepper_z2]
uart_pin: PA8
diag_pin: ^!PA15
interpolate: true #false # True for TMC_autotune 
run_current: 0.8
sense_resistor: 0.110
# stealthchop_threshold: 0 # Comment out for TMC_Autotune

# TMC_Autotune definitions
[autotune_tmc stepper_z2]
motor: ldo-42sth40-1684l300e # Same as LD0-42STH40-1684CL350E per docs

#####################################################################
#   Extruder
#####################################################################

##  Connected to STEPPER 0
##  Heater - HEATER
##  Thermistor - TH0

[extruder]
step_pin: nhk:PB8 #gpio23
dir_pin: nhk:PB9 #gpio24
enable_pin: !nhk:PC14 #gpio25
##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point
rotation_distance: 22.5514877407 #22.6789511   #Bondtech 5mm Drive Gears
##  Update Gear Ratio depending on your Extruder Type
##  Use 50:10 for Stealthburner/Clockwork 2
##  Use 50:17 for Afterburner/Clockwork (BMG Gear Ratio)
##  Use 80:20 for M4, M3.1
gear_ratio: 50:10               #BMG Gear Ratio
microsteps: 32
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: nhk:PA7 #gpio9
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for NTC 100k 3950 thermistors
sensor_type: Generic 3950
sensor_pin: nhk:PB12 #gpio29 #TH0
pullup_resistor: 2200
min_temp: 10
max_temp: 290
max_power: 1.0
min_extrude_temp: 10 #170
max_extrude_only_distance: 400
max_extrude_cross_section: 5
#control = pid
#pid_kp = 26.213
#pid_ki = 1.304
#pid_kd = 131.721
##  Try to keep pressure_advance below 1.0
#pressure_advance: 0.05
##  Default is 0.040, leave stock
pressure_advance_smooth_time: 0.020

[tmc2209 extruder]
sense_resistor:  0.100
uart_pin: nhk:PB7 #gpio0
tx_pin: nhk:PB6 #gpio1
interpolate: false
run_current: 0.5         #recommend setting it below 0.7A.

# TMC_Autotune definitions
[autotune_tmc extruder]
motor: ldo-36sth20-1004ahg

[firmware_retraction] # Retraction setting s used for KAMP but can be applied if slicer option selected
retract_length: .2
#   The length of filament (in mm) to retract when G10 is activated,
#   and to unretract when G11 is activated (but see
#   unretract_extra_length below). The default is 0 mm.
retract_speed: 30
#   The speed of retraction, in mm/s. The default is 20 mm/s.
unretract_extra_length: 0
#   The length (in mm) of *additional* filament to add when
#   unretracting.
unretract_speed: 10
#   The speed of unretraction, in mm/s. The default is 10 mm/s.


#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
##  SSR Pin - HEATBED
##  Thermistor - TH1
heater_pin: PG11
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for Keenovo heaters
sensor_type: Generic 3950
sensor_pin: PA2
pullup_resistor: 2200
##  Adjust Max Power so your heater doesn't warp your bed. Rule of thumb is 0.4 watts / cm^2 .
max_power: 0.65
min_temp: 0
max_temp: 120
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769

#####################################################################
#   Probe
#####################################################################

[mcu cartographer] # See https://www.klipper3d.org/Config_Reference.html#mcu
# Remove either the serial or canbus_uuid line dependant on your setup.
#canbus_uuid: 0ca8d67388c2 
serial: /dev/serial/by-id/usb-Cartographer_stm32f042x6_03001B001143304146393320-if00
restart_method: command

[cartographer]
mcu: cartographer            
#   Offsets are measured from the centre of your coil, to the tip of your nozzle 
#   on a level axis. It is vital that this is accurate. 
x_offset: 0 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 23 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: yes # For extra output
# old software threshold: 2250

[bed_mesh]
zero_reference_position: 150, 150    
#    set this to the middle of your bed
speed: 200
#    movement speed of toolhead during bed mesh
horizontal_move_z: 3
#    height of scanner during bed mesh scan
mesh_min: 25, 23  # configure this 
#    start point of bed mesh [X, Y]
mesh_max: 280, 280 # configure this
#    end point of bed mesh [X, Y]
probe_count: 30, 30
algorithm: bicubic
adaptive_margin: 10
# # Default adaptive mesh parameters
# mesh_pps: 0,0 # Disable interpolation - mesh is probably dense enough

[cartographer scan]
#probe_speed: 5
#   Speed (in mm/s) of the Z axis when probing. The default is 5mm/s.
mesh_runs: 2
#   Number of runs when doing a scan mesh.
#   Consecutive runs will trace back the way it came from.
#   The default is 1 run.
#mesh_direction: x
#   Axis of which to do the most moves along - either 'x' or 'y'.
#   The default is the x-axis
#mesh_height: 3
#   The height (in mm) of the head, when doing a mesh run.
#   The default is 3 mm.
#mesh_path: snake
#   The path to use when calibrating a scan mesh - either 'snake',
#   'alternating_snake', 'spiral' or 'random'.
#   The default is snake.

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 0
max_temp: 105

#####################################################################
#   Fan Control
#####################################################################

[fan]
##  Print Cooling Fan - FAN0
pin: nhk:PA15 #gpio6
tachometer_pin: nhk:PD2 #gpio17
tachometer_ppr: 2
kick_start_time: 0.5
##  Depending on your fan, you may need to increase this value
##  if your fan will not start. Can change cycle_time (increase)
##  if your fan is not able to slow down effectively
off_below: 0.10

[heater_fan hotend_fan]
##  Hotend Fan - FAN1
pin: nhk:PD0 #gpio5
tachometer_pin: nhk:PD1 #gpio16
tachometer_ppr: 2
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
shutdown_speed: 1.0
##  If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0

[controller_fan controller_fan]
##  Controller fan - FAN2
pin: PF7
max_power: 0.5
##tachometer_pin: PF6
kick_start_time: 0.4
heater: heater_bed

[controller_fan controller_fan2]
##  Controller fan - FAN
pin: PB7
max_power: 0.3
kick_start_time: 0.4
heater: heater_bed

[heater_fan nevermore]
pin: PF9
max_power: 1.0
kick_start_time: 0.5
heater: heater_bed
heater_temp: 50.0
##    If you are experiencing back flow, you can reduce fan_speed
fan_speed: 0.8

